name: Deploy to Vercel

on:
  push:
    branches: [dev, beta, main]
    tags: ['v*']

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=${{ github.ref_name == 'main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ github.ref_name == 'main' && secrets.SUPABASE_URL_PROD || github.ref_name == 'beta' && secrets.SUPABASE_URL_BETA || secrets.SUPABASE_URL_DEV }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ github.ref_name == 'main' && secrets.SUPABASE_ANON_PROD || github.ref_name == 'beta' && secrets.SUPABASE_ANON_BETA || secrets.SUPABASE_ANON_DEV }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Output URL
        run: echo "Deployed to ${{ steps.deploy.outputs.stdout }}"
